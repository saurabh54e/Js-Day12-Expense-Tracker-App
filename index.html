<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <h1 class="heading">Expense Tracker</h1>
        <div class="summary-card balance-card">
          <h2>Current Balance</h2>
          <span id="balanceAmount">₹0.00</span>
        </div>
        <div class="income-expense">
          <div class="summary-card income-card">
            <h3 class="income">Income</h3>
            <span id="incomeAmount">₹0.00</span>
          </div>
          <div class="summary-card expense-card">
            <h3 class="expense">Expense</h3>
            <span id="expenseAmount">₹0.00</span>
          </div>
        </div>

        <section class="add-transaction">
          <h3 class="section-title">+ Add Transaction</h3>
          <form id="form" class="transaction-form">
            <div class="form-group">
              <label for="title">Title</label>
              <input
                type="text"
                id="title"
                placeholder="Enter title..."
                required
              />
            </div>
            <div class="form-group">
              <label for="amount">Amount</label>
              <input
                type="number"
                id="amount"
                min="1"
                step="0.01"
                placeholder="Enter amount..."
                required
              />
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="food">Food</option>
                <option value="groceries">Groceries</option>
                <option value="entertainment">Entertainment</option>
                <option value="transportation">Transportation</option>
                <option value="utilities">Utilities</option>
                <option value="healthcare">Healthcare</option>
                <option value="education">Education</option>
                <option value="personal-care">Personal Care</option>
                <option value="miscellaneous">Miscellaneous</option>
                <option value="salary">Salary</option>
                <option value="freelance">Freelance</option>
                <option value="investments">Investments</option>
                <option value="gifts">Gifts</option>
              </select>
            </div>
            <div class="form-group">
              <p>Type</p>
              <div class="radio-group">
                <label>
                  <input type="radio" name="type" value="income" checked />
                  Income
                </label>

                <label>
                  <input type="radio" name="type" value="expense" />
                  Expense
                </label>
              </div>
            </div>
            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" name="date" required />
            </div>
            <button id="submitBtn" class="btn btn-primary" type="submit">
              Add Transaction
            </button>
          </form>
        </section>

        <section class="search-section">
          <h3 class="section-title">Search Transactions</h3>
          <div class="search-controls">
            <input
              class="search-input"
              type="text"
              id="search"
              placeholder="Search transactions..."
            />
            <select class="filter-select" id="filter">
              <option value="all">All Categories</option>
              <option value="food">Food</option>
              <option value="groceries">Groceries</option>
              <option value="entertainment">Entertainment</option>
              <option value="transportation">Transportation</option>
              <option value="utilities">Utilities</option>
              <option value="healthcare">Healthcare</option>
              <option value="education">Education</option>
              <option value="personal-care">Personal Care</option>
              <option value="miscellaneous">Miscellaneous</option>
              <option value="salary">Salary</option>
              <option value="freelance">Freelance</option>
              <option value="investments">Investments</option>
              <option value="gifts">Gifts</option>
            </select>
          </div>
        </section>

        <section class="recent-transactions">
          <h3 class="section-title">Recent Transactions</h3>
          <ul id="transaction-list" class="transaction-list">
            <!-- <li class="transaction-item">
              <div class="transaction-info">
                <h4 class="transaction-title">Salary</h4>
                <p class="transaction-category">Salary • 30 Jun 2026</p>
              </div>

              <span class="transaction-amount income">+₹50,000</span>

              <div class="transaction-actions">
                <button class="btn btn-edit">Edit</button>
                <button class="btn btn-delete">Delete</button>
              </div>
            </li> -->
          </ul>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
